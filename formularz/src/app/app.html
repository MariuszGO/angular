<div class="container">
  <h1>Formularz użytkownika</h1>

  <form (ngSubmit)="onSubmit()" #userForm="ngForm">

    <label for="imie">Imię:</label>
    <input type="text" id="imie" name="imie" [(ngModel)]="imie" required/>

    <label for="nazwisko">Nazwisko:</label>
    <input type="text" id="nazwisko" name="nazwisko" [(ngModel)]="nazwisko" required/>

    <label for="wiek">Wiek:</label>
    <input type="number" id="wiek" name="wiek" [(ngModel)]="wiek" required/>

    <button type="submit">Wyślij</button>

  </form>

  @if (wyslano) {
    <div class="wynik">
      Masz na imię <b>{{ imie }}</b>, na nazwisko <b>{{ nazwisko }}</b> 
      i masz <b>{{ wiek }}</b> lat.

@if (wiek !== null) {

  @if (wiek >= 18) {
    <p>Jesteś pełnoletni</p>
  } @else {
    <p>Nie masz 18 lat</p>
  }

}

    </div>
  }

</div>
